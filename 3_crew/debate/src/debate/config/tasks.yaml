propose:
  description: >
    You are proposing the motion: {motion}.
    Come up with a clear argument in favor of the motion.
    Be very convincing.
  expected_output: >
    Your clear argument in favor of the motion, in a concise manner.
  agent: debater
  output_file: output/propose.md

oppose:
  description: >
    You are in opposition to the motion: {motion}.
    Come up with a clear argument against the motion.
    Be very convincing.
  expected_output: >
    Your clear argument against the motion, in a concise manner.
  agent: debater
  output_file: output/oppose.md
decide:
  description: >
    Review the arguments presented by the debaters and decide which side is more convincing.
  expected_output: >
    Your decision on which side is more convincing, and why.
  agent: judge
  output_file: output/decide.md

supreme_court_review:
  description: >
    As a Supreme Court judge from Pakistan, review the lower court judge's decision and the original arguments.
    Provide a final, authoritative ruling on the motion: {motion}.
  expected_output: >
    Your final Supreme Court decision on which side is more convincing, with detailed reasoning.
  agent: supreme_court_judge
  output_file: output/supreme_court_review.md